version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: faraway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: faraway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - faraway-postgres-data:/var/lib/postgresql/data

volumes:
  faraway-postgres-data:
